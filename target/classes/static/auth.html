<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Authentication System</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            background: #f0f0f0;
            border-bottom: 2px solid #ddd;
        }

        .tab-button {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            background: #667eea;
            color: white;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .captcha-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .user-info {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }

        .user-info p {
            margin: 8px 0;
            color: #666;
        }

        .user-info strong {
            color: #333;
        }

        .logout-button {
            background: #dc3545;
            margin-top: 15px;
        }

        .logout-button:hover {
            background: #c82333;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
            margin-left: 5px;
            animation: blink 1.4s infinite;
        }

        @keyframes blink {
            0%, 20%, 50%, 80%, 100% { opacity: 1; }
            40% { opacity: 0.5; }
            60% { opacity: 0.7; }
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status-badge.verified {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.unverified {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('signup')">Sign Up</button>
            <button class="tab-button" onclick="switchTab('otp')">Verify OTP</button>
            <button class="tab-button" onclick="switchTab('login')">Login</button>
            <button class="tab-button" onclick="switchTab('profile')">Profile</button>
        </div>

        <!-- SIGNUP TAB -->
        <div id="signup" class="tab-content active">
            <h2>Create Account</h2>
            <div id="signupMessage" class="message"></div>
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupName">Full Name *</label>
                    <input type="text" id="signupName" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email *</label>
                    <input type="email" id="signupEmail" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="signupPhone">Phone Number</label>
                    <input type="tel" id="signupPhone" placeholder="Enter your phone number">
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password *</label>
                    <input type="password" id="signupPassword" required placeholder="Min 8 characters">
                </div>

                <div class="form-group">
                    <div class="captcha-container">
                        <div class="g-recaptcha" data-sitekey="6Ld8lcwsAAAAAP74_w4TCkByDY600e8li_hJBqCD"></div>
                    </div>
                </div>

                <button type="submit">Sign Up</button>
            </form>
        </div>

        <!-- OTP VERIFICATION TAB -->
        <div id="otp" class="tab-content">
            <h2>Verify OTP</h2>
            <div id="otpMessage" class="message"></div>
            <form id="otpForm">
                <div class="form-group">
                    <label for="otpEmail">Email *</label>
                    <input type="email" id="otpEmail" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="otpCode">OTP Code *</label>
                    <input type="text" id="otpCode" required placeholder="6-digit code" maxlength="6" inputmode="numeric">
                </div>

                <button type="submit">Verify OTP</button>
                <button type="button" onclick="resendOtp()" style="background: #6c757d; margin-top: 10px;">Resend OTP</button>
            </form>
        </div>

        <!-- LOGIN TAB -->
        <div id="login" class="tab-content">
            <h2>Login</h2>
            <div id="loginMessage" class="message"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email *</label>
                    <input type="email" id="loginEmail" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password *</label>
                    <input type="password" id="loginPassword" required placeholder="Enter your password">
                </div>

                <div class="form-group">
                    <div class="captcha-container">
                        <div class="g-recaptcha" data-sitekey="6Ld8lcwsAAAAAP74_w4TCkByDY600e8li_hJBqCD"></div>
                    </div>
                </div>

                <button type="submit">Login</button>
            </form>
        </div>

        <!-- PROFILE TAB -->
        <div id="profile" class="tab-content">
            <h2>User Profile</h2>
            <div id="profileMessage" class="message"></div>
            <div id="profileContent"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api/auth';

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // Utility functions
        function showMessage(elementId, message, type = 'info') {
            const messageEl = document.getElementById(elementId);
            messageEl.textContent = message;
            messageEl.className = `message ${type}`;
        }

        function clearForms() {
            document.getElementById('signupForm').reset();
            document.getElementById('loginForm').reset();
            document.getElementById('otpForm').reset();
            grecaptcha.reset();
        }

        // SIGNUP
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const captchaToken = grecaptcha.getResponse();
            if (!captchaToken) {
                showMessage('signupMessage', 'Please complete the CAPTCHA', 'error');
                return;
            }

            const data = {
                name: document.getElementById('signupName').value,
                email: document.getElementById('signupEmail').value,
                password: document.getElementById('signupPassword').value,
                phone: document.getElementById('signupPhone').value,
                captchaToken: captchaToken
            };

            try {
                const response = await fetch(`${API_URL}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showMessage('signupMessage', '✓ ' + result.message, 'success');
                    clearForms();
                    setTimeout(() => {
                        document.querySelector('[onclick="switchTab(\'otp\')"]').click();
                    }, 2000);
                } else {
                    showMessage('signupMessage', '✗ ' + result.message, 'error');
                }
            } catch (error) {
                showMessage('signupMessage', '✗ Error: ' + error.message, 'error');
            }
        });

        // OTP VERIFICATION
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                email: document.getElementById('otpEmail').value,
                otp: document.getElementById('otpCode').value
            };

            try {
                const response = await fetch(`${API_URL}/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showMessage('otpMessage', '✓ ' + result.message, 'success');
                    document.getElementById('otpForm').reset();
                    setTimeout(() => {
                        document.querySelector('[onclick="switchTab(\'login\')"]').click();
                    }, 2000);
                } else {
                    showMessage('otpMessage', '✗ ' + result.message, 'error');
                }
            } catch (error) {
                showMessage('otpMessage', '✗ Error: ' + error.message, 'error');
            }
        });

        // RESEND OTP
        function resendOtp() {
            const email = document.getElementById('otpEmail').value;
            if (!email) {
                showMessage('otpMessage', 'Please enter your email', 'error');
                return;
            }

            fetch(`${API_URL}/resend-otp?email=${email}`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    showMessage('otpMessage', '✓ ' + data.message, 'success');
                })
                .catch(err => showMessage('otpMessage', '✗ Error: ' + err.message, 'error'));
        }

        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const captchaToken = grecaptcha.getResponse();
            if (!captchaToken) {
                showMessage('loginMessage', 'Please complete the CAPTCHA', 'error');
                return;
            }

            const data = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value,
                captchaToken: captchaToken
            };

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('authToken', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    showMessage('loginMessage', '✓ Login successful!', 'success');
                    clearForms();
                    setTimeout(() => {
                        document.querySelector('[onclick="switchTab(\'profile\')"]').click();
                        loadProfile();
                    }, 2000);
                } else {
                    showMessage('loginMessage', '✗ ' + result.message, 'error');
                }
            } catch (error) {
                showMessage('loginMessage', '✗ Error: ' + error.message, 'error');
            }
        });

        // PROFILE
        function loadProfile() {
            const user = JSON.parse(localStorage.getItem('user'));
            const token = localStorage.getItem('authToken');

            if (!user || !token) {
                showMessage('profileMessage', 'Please login first', 'info');
                document.getElementById('profileContent').innerHTML = '';
                return;
            }

            const verified = user.emailVerified ? 'verified' : 'unverified';
            const statusClass = user.emailVerified ? 'verified' : 'unverified';
            
            document.getElementById('profileContent').innerHTML = `
                <div class="user-info">
                    <p><strong>Name:</strong> ${user.name}</p>
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>Phone:</strong> ${user.phone || 'Not provided'}</p>
                    <p><strong>Account Status:</strong> ${user.accountEnabled ? 'Active' : 'Disabled'}</p>
                    <p><strong>Email Verification:</strong> 
                        <span class="status-badge ${statusClass}">
                            ${user.emailVerified ? 'Verified ✓' : 'Unverified ✗'}
                        </span>
                    </p>
                </div>
                <button class="logout-button" onclick="logout()">Logout</button>
            `;
        }

        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('user');
            document.getElementById('profileContent').innerHTML = '';
            showMessage('profileMessage', 'Logged out successfully', 'success');
            document.querySelector('[onclick="switchTab(\'login\')"]').click();
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            const user = localStorage.getItem('user');
            if (user) {
                document.querySelector('[onclick="switchTab(\'profile\')"]').click();
                loadProfile();
            }
        });
    </script>
</body>
</html>
